[gcode_macro KINEMATIC_ZHOP_TEST]
description: Stress test Z-axis with manual distance verification
gcode:
    # --- Configuration ---
    {% set SPEED = params.SPEED|default(18000)|int %}
    {% set HOPS = params.LOOPS|default(10)|int %}
    {% set Z_DROP = params.Z_DROP|default(0.2)|float %}
    {% set XY_DIST = params.XY_DIST|default(50.0)|float %}

    # 1. Pre-flight Check
    M118 --- Starting Pre-Flight Driver Check ---
    DUMP_TMC STEPPER=stepper_z

    M118 --- Configuration Check ---
    M118 Current max_z_accel: {printer.configfile.settings.printer.max_z_accel} mm/s^2
    
    {% if not 'xyz' in printer.toolhead.homed_axes %} G28 {% endif %}
    G90
    G1 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} Z2.0 F6000
    M400

    # 2. Baseline
    M118 Taking baseline...
    BEACON_QUERY ; Force Beacon to report current height
    M400
    M118 Review the last Beacon reading in the console.
    
    # 3. Execution
    M118 Executing {HOPS} kinematic cycles...
    G91 
    {% for i in range(HOPS) %}
        G1 X{XY_DIST} Y{XY_DIST} Z{Z_DROP} F{SPEED}
        G1 X-{XY_DIST} Y{XY_DIST} Z-{Z_DROP} F{SPEED}
        G1 X-{XY_DIST} Y-{XY_DIST} Z{Z_DROP} F{SPEED}
        G1 X{XY_DIST} Y-{XY_DIST} Z-{Z_DROP} F{SPEED}
    {% endfor %}
    G90
    M400

    # 4. Results
    M118 Taking final reading...
    BEACON_QUERY
    M400
    M118 Test complete. Compare the 'Last reading' values printed in the console above.
    

[gcode_macro SAFE_Z_HOP_STRESS_TEST]
description: Safely test Z-axis limits using passive Beacon readings
gcode:
    # Set parameters with safe default values
    {% set START_SPEED = params.START_SPEED|default(300)|int %}    # Starting speed in mm/min (5mm/s)
    {% set MAX_SPEED = params.MAX_SPEED|default(1800)|int %}      # Max speed to test (30mm/s)
    {% set STEP_SPEED = params.STEP_SPEED|default(300)|int %}     # Speed increase per tier
    {% set HOPS = params.HOPS_PER_TIER|default(50)|int %}         # Hops per tier
    {% set DISTANCE = params.DISTANCE|default(2.0)|float %}       # Z-hop distance
    {% set TEST_HEIGHT = params.TEST_HEIGHT|default(2.0)|float %} # Height to take Beacon readings

    # 1. Home the printer if needed
    {% if not 'xyz' in printer.toolhead.homed_axes %}
        M118 Homing printer...
        G28
    {% endif %}

    # 2. Move to a safe reading height
    M118 Moving to test height Z={TEST_HEIGHT}...
    G90
    G1 Z{TEST_HEIGHT} F600
    M400 ; Wait for move to finish

    # 3. Take a baseline measurement
    M118 Taking baseline Beacon reading...
    CHECK_Z
    M400
    G4 P3000 ; 3-second pause to read baseline

    # 4. Progressive Speed Loop
    {% for speed in range(START_SPEED, MAX_SPEED + 1, STEP_SPEED) %}
        M118 --- Testing Tier: {HOPS} hops at F{speed} ({speed/60} mm/s) ---
        
        G91 ; Relative positioning
        {% for i in range(HOPS) %}
            G1 Z{DISTANCE} F{speed}
            G1 Z-{DISTANCE} F{speed}
        {% endfor %}
        G90 ; Absolute positioning
        
        M400 ; Ensure all hops finish before querying
        
        # Passive reading and Pause
        M118 Reading Beacon after F{speed}...
        CHECK_Z
        M400
        G4 P3000 ; 3-second pause to let you read the console and react
    {% endfor %}
    
    M118 Test complete. Review the CHECK_Z distance readings above.
    

[gcode_macro PRINT_START]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(100)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(190)|float %}
    {% set Z_OFFSET = params.Z_OFFSET|default(0)|float %}
    {% set MAX_WAIT = params.MAX_WAIT|default(0)|int %}
    {% set BED_SOAK_TIME = params.BED_SOAK_TIME|default(180)|int %}  # Default 2-minute soak for cold bed
    {% set COLD_BED_THRESHOLD = 40 %}  # Bed is "cold" if below 40°C
    {% set HOT_BED_SOAK_TIME = 0 %}   # Short soak time (1 minute) for hot bed
    # {% set HIGH_BED_TEMP = 110 %}      # Higher temp for cold bed heating

    # Get the current bed and chamber temperatures
    {% set current_bed_temp = printer['temperature_sensor bed'].temperature|float|round(1) if 'temperature_sensor bed' in printer 
             else printer.heater_bed.temperature|float|round(1) %}
    {% set current_chamber_temp = printer['temperature_sensor chamber'].temperature|float|round(1) if 'temperature_sensor chamber' in printer 
             else 25.0 %}  # Assume 25°C if no chamber sensor

    # Determine bed sensor for TEMPERATURE_WAIT
    {% set bed_sensor = 'temperature_sensor bed' if 'temperature_sensor bed' in printer else 'heater_bed' %}

    # Determine target bed temperature and soak time
    {% if current_bed_temp < COLD_BED_THRESHOLD or current_chamber_temp < 32 %}
      {% set TARGET_BED_TEMP = BED_TEMP %}
      {% set SOAK_TIME = BED_SOAK_TIME %}
      {% set COOL_DOWN = true %}
    {% else %}
      {% set TARGET_BED_TEMP = BED_TEMP %}
      {% set SOAK_TIME = HOT_BED_SOAK_TIME %}
      {% set COOL_DOWN = false %}
    {% endif %}

    # Reset extruder multiplier
    M221 S100
    
    # Home axes and position for heat soak
    G28          ; home axes
    G0 Z10       ; move to Z=10mm for heat soak (safe height)
    G0 X20 Y20   ; move to safe position

    # Send status messages
    RESPOND MSG="Current chamber temp: {current_chamber_temp}℃"
    RESPOND MSG="Current bed temp: {current_bed_temp}℃"
    RESPOND MSG="Target bed temp: {BED_TEMP}℃"
    RESPOND MSG="Heating bed to: {TARGET_BED_TEMP}℃"
    RESPOND MSG="Heating hotend to: {EXTRUDER_TEMP}℃"
    
    # Start chamber fan
    SET_FAN_SPEED FAN=Exhaust_fan SPEED=1.0
    # SET_FAN_SPEED FAN=Bed_bottom_fan SPEED=1.0
    
    # Heat bed to target temperature
    M190 S{TARGET_BED_TEMP|int}
    
    # If bed was cold, wait for it to cool to BED_TEMP and soak
    {% if SOAK_TIME > 0 %}
      {% if COOL_DOWN %}
        RESPOND MSG="Bed heated to {TARGET_BED_TEMP}℃. Cooling to {BED_TEMP}℃ and soaking for {SOAK_TIME} seconds."
        G4 S{SOAK_TIME|int}  ; Additional soak time after cooling
        RESPOND MSG="Soaking finished."
        M190 S{BED_TEMP|int}
      {% else %}
        RESPOND MSG="Bed already hot. Soaking for {SOAK_TIME} seconds."
        G4 S{SOAK_TIME|int}  ; Short soak for hot bed
        RESPOND MSG="Soaking finished."
      {% endif %}
    {% endif %}
    
    # Heat extruder
    M109 S{EXTRUDER_TEMP}

    # Wait additional time if specified
    {% if MAX_WAIT > 0 %}
      RESPOND MSG="Wait {MAX_WAIT} seconds."
      G4 S{MAX_WAIT|int}
    {% endif %}

    # SET_FAN_SPEED FAN=Bed_bottom_fan SPEED=0.0
    # Bed mesh and calibration
    BED_MESH_CLEAR
    BED_MESH_PROFILE LOAD="default"
    G28 Z METHOD=CONTACT CALIBRATE=0
    SET_GCODE_OFFSET Z=0 MOVE=1
    RESPOND MSG="Applying Z_OFFSET: {Z_OFFSET}mm"
    SET_GCODE_OFFSET Z_ADJUST={Z_OFFSET} MOVE=1

    # Prepare for printing
    Smart_Park
    RESPOND MSG="Draw adaptive purge line"
    VORON_PURGE
    
    RESPOND MSG="Printing start."
    BEACON_QUERY

    
