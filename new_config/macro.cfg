[gcode_macro X_MOVEMENT_TEST]
gcode:
    # Ensure homing has occurred before moving
    {% if "x" not in printer.toolhead.homed_axes %}
        {action_raise_error("Must home X axis first!")}
    {% endif %}

    # Save the current feedrate to restore it later
    {% set original_feedrate = printer.gcode_move.speed %}
    
    # Get the current Y coordinate
    {% set current_x = printer.toolhead.position.x|float %}
    
    # Set a safe speed for testing (900 mm/min = 15 mm/s)
    {% set test_speed = 900 %}

    {action_respond_info("Starting X-axis test at X: " + current_x|string + "mm")}

    # Switch to relative positioning for the loop
    G91
    
    # Loop 10 times
    {% for i in range(10) %}
        # Move up 1mm
        G1 X1 F{test_speed}
        # Move down 1mm
        G1 X-1 F{test_speed}
    {% endfor %}
    
    # Restore absolute positioning state
    G90
    
    # Ensure X returns precisely to the starting height (accounting for any cumulative rounding)
    G1 X{current_x} F{test_speed}
    
    # Restore original speed
    G1 F{original_feedrate}
    
    {action_respond_info("X-axis test completed.")}


