[gcode_macro DRY_FILAMENT]
description: Home if needed, park, heat bed to dry filament, wait HOURS, notify done
gcode:
  {% set BED_TEMP = params.BED_TEMP|default(90)|int %}
  {% set HOURS    = params.HOURS|default(8)|int %}
  {% set X_PARK   = params.X|default(150)|float %}
  {% set Z_PARK   = params.Z|default(100)|float %}

  # compute Y max from config
  {% set Y_MAX = printer.configfile.config["stepper_y"]["position_max"]|float %}

  # derive wait seconds and a comfy idle timeout
  {% set WAIT_S = HOURS * 3600 %}
  {% set NEW_IDLE = WAIT_S + 900 %}  # +15 min cushion
  {% set ORIG_IDLE = printer.configfile.settings.idle_timeout.timeout|int %}

  # 1) Home if not already
  {% if "xyz" not in printer.toolhead.homed_axes|string %}
    RESPOND MSG="Homing axes…"
    G28
  {% endif %}

  # 2) Set Z=200 (or user override) and 3) park X=150, Y=max
  G90
  RESPOND MSG="Parking head for drying..."
  G1 Z{Z_PARK} F1800
  G1 X{X_PARK} Y{Y_MAX - 5.0} F6000
  
  # 4) Heat bed
  RESPOND MSG="Heating bed to {BED_TEMP}℃ for {HOURS}h…"
  M140 S{BED_TEMP}
  M117 Heating bed to {BED_TEMP}°C
  M190 S{BED_TEMP}  ; wait to reach temp

  # 5) Show message to place filament
  SPEAK MSG="Put filament on bed to dry"
  RESPOND MSG="Put filament on bed to dry"
  M117 Put filament on bed to dry

  # 5) Start 1-minute ticking loop instead of a single long G4
  RESPOND MSG="Holding {BED_TEMP}℃ for {HOURS}h…"
  RUN_SHELL_COMMAND CMD=LED_SET PARAMS="dry_hour={HOURS}"


