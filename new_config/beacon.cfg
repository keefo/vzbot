# https://docs.beacon3d.com/quickstart/
# --- BEACON DISABLED 20260628-145624: replaced by SHT36 eddy probe. Accel(resonance) also disabled - move to SHT36 LIS2DW later. ---
# [beacon]
# serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_A1543B194E5737374D202020FF0A2A1C-if00
# x_offset: 0        # update with offset from nozzle on your machine
# y_offset: 25       # update with offset from nozzle on your machine
# mesh_main_direction: x
# mesh_runs: 1
# default_probe_method: proximity
# contact_max_hotend_temperature: 300 # increase to probe at print temps
# home_xy_position: 50, 50 # update with your bed center
# home_z_hop: 3
# home_z_hop_speed: 30
# home_xy_move_speed: 150
# home_method: proximity # use proximity for induction homing
# home_method_when_homed: contact # after initial calibration use induction
# home_autocalibrate: unhomed # contact will calibrate beacon on first home
# autocal_tolerance: 0.01
# autocal_max_retries: 50

# [resonance_tester]
# accel_chip: beacon
# probe_points: 150, 150, 20

[bed_mesh]
probe_count: 30, 30
speed: 500
adaptive_margin: 5
scan_overshoot: 8
#horizontal_move_z: 11
horizontal_move_z: 3
algorithm: bicubic
bicubic_tension: 0.2
mesh_min : 30, 30
mesh_max : 300, 270
mesh_pps: 0
move_check_distance: 3
split_delta_z: .01
zero_reference_position: 165,165
fade_start: 1
fade_end: 2
fade_target: 0


[gcode_macro CHECK_BACKLASH]
gcode:
    PROBE_EDDY_CURRENT_ESTIMATE_BACKLASH CHIP=fly_eddy CYCLES=5 SAMPLES=20

[gcode_macro CHECK_PROBE_ACCURACY]
gcode:
    PROBE_ACCURACY

[gcode_macro CALIBRATE_BEACON]
description: Eddy calibration step 1/2 (drive current)
gcode:
  G90
  G28 X Y
  SET_KINEMATIC_POSITION Z=10
  G0 X150 Y142 F6000
  LDC_CALIBRATE_DRIVE_CURRENT CHIP=fly_eddy
  RESPOND MSG="Step 1 done: run SAVE_CONFIG (Klipper restarts), then run CALIBRATE_EDDY_HEIGHT for Z map calibration."

[gcode_macro CALIBRATE_EDDY_HEIGHT]
description: Eddy calibration step 2/2 (height map)
gcode:
  G90
  G28 X Y
  SET_KINEMATIC_POSITION Z=10
  G0 X150 Y142 F6000
  PROBE_EDDY_CURRENT_CALIBRATE CHIP=fly_eddy

[gcode_macro CALIBRATE_BED_MESH]
gcode:
  G28
  # OLD beacon: BED_MESH_CALIBRATE  (2026-06-28 switched to eddy rapid_scan)
  BED_MESH_CALIBRATE METHOD=rapid_scan

[gcode_macro CHECK_Z]
gcode:
  PROBE_EDDY_CURRENT_QUERY CHIP=fly_eddy


[gcode_macro AUTO_BEACON_CALIBRATE]
gcode:
  BEACON_AUTO_CALIBRATE

[gcode_macro G29]
gcode:
    M140 S110
    M190 S110
    G28
    Z_TILT_ADJUST
    BED_MESH_CALIBRATE profile=default
    #BED_MESH_PROFILE SAVE=mesh 
    SAVE_CONFIG
